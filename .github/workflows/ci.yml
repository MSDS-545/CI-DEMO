name: Minimal CI - Tests, Coverage, Security, Dashboard

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests + coverage (XML + HTML)
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}"
          pytest --junitxml=test_results.xml --cov=app --cov-report=xml --cov-report=html -v

      - name: Run Bandit (JSON)
        run: |
          bandit -r app -f json -o bandit.json || true

      - name: Run pip-audit (JSON)
        run: |
          pip-audit -f json -o dependencies.json || true

      - name: Generate consolidated HTML dashboard
        run: |
          python generate_dashboard.py

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload security reports + dashboard
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            test_results.xml
            coverage.xml
            bandit.json
            dependencies.json
            security_dashboard.html