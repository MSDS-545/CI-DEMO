name: Publish Security Dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests + coverage + reports
        run: |
          pytest --junitxml=test_results.xml \
                --cov=app --cov-report=xml --cov-report=html

          bandit -r app -f json -o bandit.json || true
          pip-audit -f json -o dependencies.json || true

          python generate_dashboard.py

      # Prepare a Pages site directory
      - name: Prepare site
        run: |
          mkdir -p site
          cp security_dashboard.html site/index.html

          # Optional: publish coverage HTML too
          cp -r htmlcov site/htmlcov

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4